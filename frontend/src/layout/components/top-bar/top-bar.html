<head>
     <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
</head>

<header class="top-bar">
    <!-- Left Side: Hamburger + Title -->
    <div class="top-bar-left">
        <button class="icon-button" aria-label="Toggle sidebar" (click)="toggleSideBar()">
            <span class="material-symbols-outlined"> menu </span>
        </button>
        <h1 class="page-title">{{pageTitle}}</h1>
    </div>

    x`  

    <!-- Right Side: Actions -->
    <div class="top-bar-right">
        <div class="action-buttons">
        <button class="btn btn-income" type="button" (click)="openAddIncome()">
          <span class="material-symbols-outlined">add</span>
          Add Income
        </button>
        <button class="btn btn-expense" type="button" (click)="openAddExpense()">
          <span class="material-symbols-outlined">add</span>
          Add Expense
        </button>
      </div>
        <!-- User Profile Button -->
        <button class="icon-button" aria-label="User profile" routerLink="./user">
            <!-- User Icon -->
            <span class="material-symbols-outlined"> account_circle </span>
        </button>
    </div>
</header>
