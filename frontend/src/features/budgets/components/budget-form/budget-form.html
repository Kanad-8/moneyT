<div class="modal-overlay" (click)="onClose()">
  
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h3>Add New Budget</h3>
      <button class="btn-close" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <form [formGroup]="budgetForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>Category</label>
        <div class="select-wrapper">
          <input
          type="text"
          formControlName="category"
          id="category"
          placeholder="category"
          appNormalizeInput>
        </div>
      </div>
      

      <div class="form-group">
        <label>Limit Amount</label>
        <div class="input-with-icon">
          <span class="currency-symbol">₹</span>
          <input 
            type="number" 
            formControlName="limitAmount" 
            placeholder="0.00"
            [class.error]="budgetForm.get('limitAmount')?.invalid && budgetForm.get('limitAmount')?.touched">
        </div>
      </div>

      <div class="form-row">
        
        <div class="form-group col">
          <label>Month</label>
          <div class="select-wrapper">
            <select formControlName="month">
              <option value="" disabled selected>Select a month</option>
              @for (m of months; track $index) {
                <option [value]="m">{{ m }}</option>
              }
            </select>
            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
        </div>

        <div class="form-group col">
          <label>Year</label>
          <input 
            type="number" 
            formControlName="year" 
            placeholder="e.g., 2025">
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="onClose()">Cancel</button>
        <button type="submit" class="btn-save">Save Budget</button>
      </div>

    </form>
  </div>
</div>
