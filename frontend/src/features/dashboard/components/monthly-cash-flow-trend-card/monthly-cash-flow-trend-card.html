<div class="cash-flow-card">
      <!-- Header -->
      <div class="card-header">
        <div class="header-left">
          <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div>
            <h3 class="card-title">Monthly Cash Flow</h3>
            <p class="card-subtitle">Income vs Expenses Trend</p>
          </div>
        </div>

        <div class="tab-group">
          <button
            class="tab-btn"
            [class.active]="activeMode === 'bar'"
            (click)="switchMode('bar')"
            title="Bar Chart">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="12" width="4" height="8"/><rect x="10" y="8" width="4" height="12"/>
              <rect x="17" y="4" width="4" height="16"/>
            </svg>
          </button>
          <button
            class="tab-btn"
            [class.active]="activeMode === 'line'"
            (click)="switchMode('line')"
            title="Line Chart">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </button>
          <button
            class="tab-btn"
            [class.active]="activeMode === 'net'"
            (click)="switchMode('net')"
            title="Net Balance">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Summary Pills -->
      <div class="summary-pills" *ngIf="data && data.length > 0">
        <div class="pill income-pill">
          <span class="pill-dot"></span>
          <span class="pill-label">Total Income</span>
          <span class="pill-value">₹{{ totalIncome | number: '1.0-0' }}</span>
        </div>
        <div class="pill expense-pill">
          <span class="pill-dot"></span>
          <span class="pill-label">Total Expense</span>
          <span class="pill-value">₹{{ totalExpense | number: '1.0-0' }}</span>
        </div>
        <div class="pill" [class.net-positive-pill]="totalNet >= 0" [class.net-negative-pill]="totalNet < 0">
          <span class="pill-dot"></span>
          <span class="pill-label">Net Balance</span>
          <span class="pill-value">₹{{ totalNet | number: '1.0-0' }}</span>
        </div>
      </div>

      <!-- Chart -->
      <div class="chart-wrapper">
        <canvas #chartCanvas></canvas>

        <div class="empty-state" *ngIf="!data || data.length === 0">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <p>No cash flow data available.</p>
        </div>
      </div>
    </div>
