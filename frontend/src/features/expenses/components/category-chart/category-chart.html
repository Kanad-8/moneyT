  <div class="chart-card">
      <div class="card-header">
        <h2>Category Distribution</h2>
      </div>
      <div class="card-body">
        <!-- 
          The chart needs a relative container to
          obey its 'responsive: true' setting.
        -->
        <div class="chart-container">
          <!-- This is the canvas element Chart.js will draw on -->
          <canvas #canvas></canvas>
          <div class="chart-center-label">
            <span>Chart</span>
          </div>
        </div>
      </div>
    </div>
