<div class="limit-card">
  
  <div class="card-header">
    <h3>Categories Nearing Limit</h3>
  </div>

  <div class="limit-list">
    @for (item of nearingCategories; track item.categoryName) {
      <div class="limit-item">
        <span class="category-name">{{ item.categoryName }}</span>
        
        <span class="percentage-value" 
              [class.critical]="item.percentage >= 90" 
              [class.warning]="item.percentage < 90">
          {{ item.percentage }}%
        </span>
      </div>
    } 
    @empty {
      <div class="empty-state">No alerts. You are within budget!</div>
    }
  </div>

</div>
